name: Branch Test & Publish

on:
    pull_request:
        types: [opened, synchronize, reopened, labeled]
        branches:
            - master

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        outputs:
            author: ${{ steps.step1.outputs.author }}
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - id: "step1"
              run: |
                  AUTHOR_NAME=$(git show ${{ github.event.pull_request.head.sha }} | grep Author)
                  echo "::set-output name=author::$AUTHOR_NAME"
    test-and-publish:
        if: "!contains(needs.check.outputs.author, 'GitHub Action Branch') && !contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        timeout-minutes: 60

        needs: check
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 4
            - uses: actions/setup-node@v3
              with:
                  node-version: "20"
                  check-latest: true
            - run: git fetch --prune --unshallow
            - run: |
                  make yarn_install

            - name: Setup Git
              if: "success() && contains(github.event.pull_request.labels.*.name, 'publish')"
              uses: webfactory/ssh-agent@v0.4.1
              with:
                  ssh-private-key: ${{ secrets.GHA_DEPLOY_KEY }}

            - name: Lerna Publish
              if: "success() && contains(github.event.pull_request.labels.*.name, 'publish') && !contains(needs.check.outputs.author, 'GitHub Action Branch')"
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  NODE_ENV: production
              run: |
                  git config user.email "action@github.com"
                  git config user.name "GitHub Action Branch"
                  git remote set-url origin "git@github.com:${{ github.repository }}"
                  git fetch
                  git checkout -- .
                  git checkout --track origin/$(echo $GITHUB_HEAD_REF | cut -d'/' -f 3)
                  NUMBER=${{ github.event.number }} yarn publish-branch