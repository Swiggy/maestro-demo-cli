name: Master Publish

on:
    push:
        branches: [master]

permissions:
    id-token: write  # Required for OIDC
    contents: read

jobs:
    init:
        if: "!contains(github.event.head_commit.author.name, 'GitHub Action') && !contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                    node-version: "20"
                    registry-url: 'https://registry.npmjs.org'
                    package-manager-cache: false
            - run: git fetch --prune
            - run: |
                  make yarn_install

            - name: Lerna Publish
              if: "success() && !contains(github.event.head_commit.author.name, 'GitHub Action')"
              env:
                  NODE_ENV: production
              run: |
                  git config user.email "action@github.com"
                  git config user.name "GitHub Action"
                  git remote set-url origin "git@github.com:${{ github.repository }}"
                  git checkout -- .
                  yarn publish-stable