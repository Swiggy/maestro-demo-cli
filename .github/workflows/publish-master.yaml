name: Master Publish

on:
    push:
        branches: [master]

permissions:
    id-token: write  # Required for OIDC
    contents: write  # Required to push version bump commits

jobs:
    init:
        if: "!contains(github.event.head_commit.author.name, 'GitHub Action') && !contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - uses: actions/checkout@v6
              with:
                    fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                    node-version: "24"
                    registry-url: 'https://registry.npmjs.org'
            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.10.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
            - run: git fetch --prune
            - run: |
                  make yarn_install

            - name: Lerna Publish
              if: "success() && !contains(github.event.head_commit.author.name, 'GitHub Action')"
              env:
                  NODE_ENV: production
              run: |
                  git config user.email "action@github.com"
                  git config user.name "GitHub Action"
                  git remote set-url origin "git@github.com:${{ github.repository }}"
                  yarn publish-stable